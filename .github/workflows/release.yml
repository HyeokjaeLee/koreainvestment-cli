name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave empty to publish current main HEAD.'
        required: false
        type: string

# Serialize publish attempts so a branch push and a tag push pointing at the same
# commit cannot double-publish. Runs are queued, not cancelled.
concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Upgrade npm to Trusted-Publishing-capable version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint 'src/**/*.ts'

      - name: Build
        run: npx tsup

      - name: Detect publish mode
        id: mode
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "mode=tag" >> "$GITHUB_OUTPUT"
          else
            echo "mode=branch" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches package.json (tag mode)
        if: steps.mode.outputs.mode == 'tag'
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "Tag:     $TAG"
          echo "Package: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Check whether this version is already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$PKG_NAME" version 2>/dev/null || echo "none")
          echo "package=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "local=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$PKG_VERSION" = "$PUBLISHED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$PKG_NAME@$PKG_VERSION is already published - skipping publish step."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Local $PKG_VERSION != published $PUBLISHED - will publish."
          fi

      - name: Publish to npm (OIDC Trusted Publishing)
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public

      - name: Create git tag for branch-mode publish
        if: steps.mode.outputs.mode == 'branch' && steps.check.outputs.skip == 'false'
        run: |
          NEW_TAG="v${{ steps.check.outputs.local }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.local }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
